            <div class="kpi-card"><h4>PICKED</h4><p class="kpi-v">10</p><span class="pnd">PENDING: 6</span></div>
            <div class="kpi-card"><h4>PGI</h4><p class="kpi-v">9</p><span class="pnd">PENDING: 1</span></div>
            <div class="kpi-card"><h4>INVOICED</h4><p class="kpi-v">6</p><span class="pnd">PENDING: 3</span></div>
        </div>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
            <div class="kpi-card"><h4>DS PRINTING</h4><p class="kpi-v">1</p><span class="pnd">PENDING: 5</span></div>
            <div class="kpi-card"><h4>CHECKED</h4><p class="kpi-v">0</p><span class="pnd">PENDING: 1</span></div>

        <div class="toggle-button-group" style="display: flex; background: #1e293b; padding: 4px; border-radius: 8px;">
            <button id="shift-day-btn" class="tab-toggle active" onclick="switchGraphShift('day')">Day Shift (5 AM - 5 PM)</button>
            <button id="shift-night-btn" class="tab-toggle" onclick="switchGraphShift('night')">Night Shift (5 PM - 4 AM)</button>
        </div>
    </div>
    
    <div style="position: relative; height: 380px; width: 100%;">
        <canvas id="milestoneTimelineChart"></canvas>
    </div>
</div>
